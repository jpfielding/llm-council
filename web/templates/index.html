<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLM Council</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-header">
        <h1>LLM Council</h1>
        <button id="new-conv-btn" title="New conversation">+ New</button>
      </div>
      <div id="conv-list"></div>
      <div class="sidebar-footer">
        <div id="council-info" class="council-info"></div>
      </div>
    </aside>

    <main id="main">
      <div id="messages"></div>
      <form id="input-form">
        <textarea id="input" placeholder="Ask the council… (Enter to send, Shift+Enter for newline)" rows="3" required></textarea>
        <button type="submit" id="send-btn">Send</button>
      </form>
    </main>
  </div>

  <script src="/static/marked.min.js"></script>
  <script src="/static/purify.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
